---
- name: "Add Kubeconfig to Ansible User .bashrc"
  ansible.builtin.lineinfile:
    path: "{{ ansible_user_dir }}/.bashrc"
    line: "export KUBECONFIG={{ dir }}/auth/kubeconfig"
  tags: install_bm

- name: "Configure PXE boot for next boot via Redfish"
  ansible.builtin.uri:
    url: "https://{{ hostvars[groups['masters'][0]]['bmc_address'] }}/redfish/v1/Systems/1"
    user: "{{ hostvars[groups['masters'][0]]['bmc_user'] | default(hostvars[groups['masters'][0]]['ipmi_user']) }}"
    password: "{{ hostvars[groups['masters'][0]]['bmc_password'] | default(hostvars[groups['masters'][0]]['ipmi_password']) }}"
    method: PATCH
    headers:
      content-type: application/json
      Accept: application/json
    body: |
      {
        "Boot": {
          "BootSourceOverrideTarget": "Pxe",
          "BootSourceOverrideEnabled": "Once"
        }
      }
    body_format: json
    validate_certs: false
    force_basic_auth: true
    status_code: [200, 204]
  tags: install_bm

- name: "Get current power state via Redfish"
  ansible.builtin.uri:
    url: "https://{{ hostvars[groups['masters'][0]]['bmc_address'] }}/redfish/v1/Systems/1"
    user: "{{ hostvars[groups['masters'][0]]['bmc_user'] | default(hostvars[groups['masters'][0]]['ipmi_user']) }}"
    password: "{{ hostvars[groups['masters'][0]]['bmc_password'] | default(hostvars[groups['masters'][0]]['ipmi_password']) }}"
    method: GET
    validate_certs: false
    force_basic_auth: true
    return_content: true
  register: si_redfish_system_info
  tags: install_bm

- name: "Display current power state"
  ansible.builtin.debug:
    msg: "Current power state: {{ si_redfish_system_info.json.PowerState }}"
  tags: install_bm

- name: "Start the baremetal node via Redfish"
  ansible.builtin.uri:
    url: "https://{{ hostvars[groups['masters'][0]]['bmc_address'] }}/redfish/v1/Systems/1/Actions/ComputerSystem.Reset"
    user: "{{ hostvars[groups['masters'][0]]['bmc_user'] | default(hostvars[groups['masters'][0]]['ipmi_user']) }}"
    password: "{{ hostvars[groups['masters'][0]]['bmc_password'] | default(hostvars[groups['masters'][0]]['ipmi_password']) }}"
    method: POST
    headers:
      content-type: application/json
      Accept: application/json
    body: |
      {
        "ResetType": "On"
      }
    body_format: json
    validate_certs: false
    force_basic_auth: true
    status_code: [200, 204]
  when: si_redfish_system_info.json.PowerState == "Off"
  tags: install_bm

- name: "Reset the baremetal node via Redfish"
  ansible.builtin.uri:
    url: "https://{{ hostvars[groups['masters'][0]]['bmc_address'] }}/redfish/v1/Systems/1/Actions/ComputerSystem.Reset"
    user: "{{ hostvars[groups['masters'][0]]['bmc_user'] | default(hostvars[groups['masters'][0]]['ipmi_user']) }}"
    password: "{{ hostvars[groups['masters'][0]]['bmc_password'] | default(hostvars[groups['masters'][0]]['ipmi_password']) }}"
    method: POST
    headers:
      content-type: application/json
      Accept: application/json
    body: |
      {
        "ResetType": "ForceRestart"
      }
    body_format: json
    validate_certs: false
    force_basic_auth: true
    status_code: [200, 204]
  when: si_redfish_system_info.json.PowerState == "On"
  tags: install_bm

- name: Show How to monitor for installation status
  ansible.builtin.debug:
    msg:
      - "Next step will provision SNO Baremetal via Redfish. It might take a few minutes for the API to respond"
      - "Once the api gets available you can run the following in another shell session"
      - "to monitor the installation progress:  export KUBECONFIG={{ dir }}/auth/kubeconfig"
      - "watch -n5 -d 'oc get nodes ; oc get co ; oc get clusterversion'"
      - "Redfish BMC operations completed successfully - IPMI bypassed"
  tags: install_bm
...
